<h1>Tiki Taka Toe</h1>

<button (click)="createGame()">
  New Game
</button>

<div *ngIf="gameId">
  <p>Game ID: {{ gameId }}</p>
</div>

<h2 *ngIf="gameId && !winner">
  Turn: {{ currentTurn || 'X' }}
</h2>

<div *ngIf="winner">
  <h2 *ngIf="winner !== 'draw'">
    Winner: {{ winner }} 🎉
  </h2>

  <h2 *ngIf="winner === 'draw'">
    Draw 🤝
  </h2>
</div>

<div style="display: flex; margin-left: 60px;">
  <div *ngFor="let col of colRules" style="width: 60px; text-align: center;">
    {{ col.display }}
  </div>
</div>
<div *ngIf="board.length">
  <div *ngFor="let row of board; let i = index" style="display: flex;">
    <div style="width: 60px; display:flex; align-items:center; justify-content:center;">
      {{ rowRules[i].display }}
    </div>
    <div
      *ngFor="let cell of row; let j = index"
      [ngStyle]="{
        'background-color': isWinningCell(i,j) 
            ? '#90ee90'
            : (selectedCell?.row === i && selectedCell?.col === j
              ? '#d6ecff'
              : 'white'),
          'cursor': (!cell.symbol || isFinished) ? 'pointer' : 'default'
      }"
      style="
        width: 60px;
        height: 60px;
        border: 1px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
      "
      (click)="onCellClick(i, j)"
    >
      <div>{{ cell.symbol }}</div>
      <div style="font-size: 10px; color: gray">
        {{ cell.player }}
      </div>
    </div>
  </div>
</div>

<div *ngIf="showPicker" class="modal">

  <div class="player-list-box">

    <input
      type="text"
      placeholder="Search player..."
      [(ngModel)]="searchTerm"
      (input)="onSearchChange(searchTerm)"
    />

    <div class="players-container">
      <div
        *ngFor="let player of filteredPlayers"
        (click)="selectPlayer(player)"
        class="player-item"
      >
        {{ player.name }}
      </div>
    </div>

  </div>

</div>

<div *ngIf="showPossiblePlayersModal" class="modal">

  <div class="player-list-box">

    <h3>Possible players</h3>

    <div class="players-container">
      <div *ngFor="let player of possiblePlayers">
        {{ player.name }}
      </div>
    </div>

    <button (click)="showPossiblePlayersModal = false">
      Close
    </button>

  </div>

</div>

<div *ngIf="showInvalidMoveFeedback" style="color:red;">
  Invalid move ❌
</div>
